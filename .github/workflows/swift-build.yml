name: Swift Build and Debug Release

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build
        run: |
          set -o pipefail
          xcodebuild -scheme "AirSync Self Compiled" -configuration "Self Compiled" clean build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Archive Build Artifacts
        if: success()
        run: |
          mkdir -p build-artifacts
          BUILD_DIR=$(xcodebuild -scheme "AirSync Self Compiled" -configuration "Self Compiled" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings | grep -m 1 '^ *BUILD_DIR' | awk '{print $3}')
          cp -R "$BUILD_DIR/Self Compiled/"* build-artifacts/
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Self-Compiled
          path: build-artifacts
