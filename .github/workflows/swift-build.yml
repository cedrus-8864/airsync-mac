name: Swift Build and Debug Release

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Build Debug
        run: |
          set -o pipefail
          xcodebuild -scheme "AirSync Self Compiled" -configuration Debug clean build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Build Release
        run: |
          set -o pipefail
          xcodebuild -scheme "AirSync Self Compiled" -configuration Release clean build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Archive Debug Build Artifacts
        if: success()
        run: |
          mkdir -p build-artifacts/Debug
          BUILD_DIR=$(xcodebuild -scheme "AirSync Self Compiled" -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings | grep -m 1 '^ *BUILD_DIR' | awk '{print $3}')
          cp -R "$BUILD_DIR/Debug/"* build-artifacts/Debug/
        shell: bash

      - name: Archive Release Build Artifacts
        if: success()
        run: |
          mkdir -p build-artifacts/Release
          BUILD_DIR=$(xcodebuild -scheme "AirSync Self Compiled" -configuration Release \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -showBuildSettings | grep -m 1 '^ *BUILD_DIR' | awk '{print $3}')
          cp -R "$BUILD_DIR/Release/"* build-artifacts/Release/
        shell: bash

      - name: Upload Debug Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Debug
          path: build-artifacts/Debug

      - name: Upload Release Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AirSync-Release
          path: build-artifacts/Release
